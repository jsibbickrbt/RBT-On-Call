name: Send On-Call Notifications

on:
  workflow_dispatch:
    inputs:
      test_user:
        description: 'Send test text to this employee (or "office"). Leave blank for normal run.'
        required: false
        default: ''
      send_calendar:
        description: 'Send calendar subscription link to this employee (name). Leave blank to skip.'
        required: false
        default: ''
      check_conflicts:
        description: 'Check all employees for on-call/vacation conflicts and text Jordan. Set to "true" to run.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send on-call notifications
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TEST_USER: ${{ github.event.inputs.test_user }}
          SEND_CALENDAR: ${{ github.event.inputs.send_calendar }}
          CHECK_CONFLICTS: ${{ github.event.inputs.check_conflicts }}
        run: python notify.py
