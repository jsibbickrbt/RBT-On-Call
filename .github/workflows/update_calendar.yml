name: Update RBT On-Call Calendars

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC - refresh all calendars
    - cron: '0 11 * * *'  # 11 AM UTC - 7 AM Eastern - send notifications
  workflow_dispatch:

jobs:
  update-and-notify:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate all ICS calendars
        run: python generate.py

      - name: Ensure .nojekyll exists
        run: touch docs/.nojekyll

      - name: Commit updated calendars
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update calendars [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send on-call notifications
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python notify.py
