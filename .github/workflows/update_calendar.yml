name: Update RBT On-Call Calendars

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC - refresh all calendars daily
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-calendars:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate all ICS calendars
        env:
          MS_CLIENT_ID:     ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_TENANT_ID:     ${{ secrets.MS_TENANT_ID }}
          MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
        run: python generate.py

      - name: Write version file
        run: echo "{\"version\":\"$(date -u '+%Y%m%d%H%M%S')\",\"updated\":\"$(date -u '+%Y-%m-%d %H:%M UTC')\"}" > docs/version.json

      - name: Ensure .nojekyll exists
        run: touch docs/.nojekyll

      - name: Commit updated calendars
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update calendars [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
