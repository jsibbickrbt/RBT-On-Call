<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBT On-Call Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
  header { background: #1a1a2e; color: white; padding: 20px 30px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.4rem; font-weight: 600; }
  header span { font-size: 1.6rem; }
  .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
  .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-size: 0.8rem; text-transform: uppercase; color: #888; background: #f8f9fa; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f2f5; font-size: 0.95rem; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  input[type=text], select { border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-size: 0.9rem; width: 100%; outline: none; transition: border 0.2s; }
  input[type=text]:focus, select:focus { border-color: #4f46e5; }
  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 22px; transition: .3s; }
  .slider:before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
  input:checked + .slider { background: #4f46e5; }
  input:checked + .slider:before { transform: translateX(18px); }
  .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: #4f46e5; color: white; }
  .btn-primary:hover { background: #4338ca; }
  .btn-danger { background: #fee2e2; color: #dc2626; }
  .btn-danger:hover { background: #fecaca; }
  .btn-success { background: #d1fae5; color: #059669; }
  .btn-success:hover { background: #a7f3d0; }
  .btn-add { background: #f0f2f5; color: #4f46e5; border: 2px dashed #c7d2fe; width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; font-size: 0.95rem; }
  .btn-add:hover { background: #eef2ff; }
  .actions { display: flex; gap: 8px; }
  .token-section { background: #fff8e1; border: 1px solid #ffd54f; border-radius: 8px; padding: 14px 16px; margin-bottom: 24px; font-size: 0.9rem; }
  .token-section input { margin-top: 8px; }
  .save-bar { position: sticky; bottom: 0; background: white; border-top: 1px solid #e5e7eb; padding: 16px 20px; display: flex; justify-content: flex-end; gap: 12px; align-items: center; }
  .status { font-size: 0.9rem; color: #6b7280; }
  .status.ok { color: #059669; }
  .status.err { color: #dc2626; }
  .ics-link { font-size: 0.8rem; color: #4f46e5; text-decoration: none; }
  .ics-link:hover { text-decoration: underline; }
  .ics-url-row td { background: #f8f7ff; padding: 6px 12px 10px 12px; }
  .ics-url-box { display: flex; align-items: center; gap: 6px; }
  .ics-url-box input { background: white; border: 1px solid #c7d2fe; border-radius: 6px; padding: 5px 8px; font-size: 0.78rem; color: #4338ca; font-family: monospace; flex: 1; cursor: pointer; }
  .btn-copy { padding: 4px 10px; font-size: 0.78rem; background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .btn-copy:hover { background: #e0e7ff; }
  .btn-copy.copied { background: #d1fae5; color: #059669; border-color: #a7f3d0; }
  .btn-test { padding: 4px 10px; font-size: 0.78rem; background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .btn-test:hover { background: #ffedd5; }
  .btn-test.sending { opacity: 0.6; cursor: not-allowed; }
  .btn-test.sent { background: #d1fae5; color: #059669; border-color: #a7f3d0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
  .badge-on { background: #d1fae5; color: #059669; }
  .badge-off { background: #f3f4f6; color: #9ca3af; }
  .btn-view { padding: 4px 10px; font-size: 0.78rem; background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .btn-view:hover { background: #dbeafe; }
  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; width: 100%; max-width: 520px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.2); margin: 20px; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #f0f2f5; display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; }
  .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888; line-height: 1; }
  .modal-close:hover { color: #333; }
  .modal-body { overflow-y: auto; padding: 16px 24px 24px; flex: 1; }
  .cal-section-title { font-size: 0.75rem; text-transform: uppercase; color: #888; font-weight: 600; margin: 16px 0 8px; letter-spacing: 0.05em; }
  .cal-section-title:first-child { margin-top: 0; }
  .cal-event { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; }
  .cal-event.oncall { background: #eff6ff; border-left: 3px solid #2563eb; }
  .cal-event.vacation { background: #f0fdf4; border-left: 3px solid #16a34a; }
  .cal-event.today { background: #fefce8; border-left: 3px solid #ca8a04; }
  .cal-date { font-weight: 600; font-size: 0.9rem; min-width: 110px; }
  .cal-label { font-size: 0.85rem; color: #555; }
  .cal-today-badge { font-size: 0.7rem; background: #fef08a; color: #854d0e; padding: 1px 6px; border-radius: 99px; font-weight: 600; margin-left: 6px; }
  .modal-loading { text-align: center; padding: 40px; color: #888; }
</style>
</head>
<body>

<header>
  <span>🏗️</span>
  <h1>RBT On-Call Manager</h1>
</header>

<div class="container">

  <div class="token-section" id="token-section">
    🔑 <strong>GitHub Token required to save changes</strong> — enter your PAT with <code>repo</code> + <code>workflow</code> scopes:
    <div style="display:flex;gap:8px;margin-top:8px;align-items:center;">
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" style="flex:1;" />
      <button class="btn btn-primary" onclick="saveToken()" style="white-space:nowrap;">Remember Me</button>
      <button class="btn" onclick="clearToken()" style="background:#fee2e2;color:#dc2626;white-space:nowrap;">Forget</button>
    </div>
    <div id="token-status" style="font-size:0.8rem;margin-top:6px;color:#888;"></div>
  </div>

  <div class="card">
    <h2>👥 Employees</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Active</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="emp-table"></tbody>
    </table>
    <button class="btn btn-add" onclick="addEmployee()">+ Add Employee</button>
  </div>

  <div class="card">
    <h2>🏢 Office Notification</h2>
    <p style="font-size:0.9rem;color:#666;margin-bottom:16px;">This number receives a daily text listing everyone who is on call.</p>
    <table>
      <thead><tr><th>Phone</th><th>Active</th><th></th></tr></thead>
      <tbody>
        <tr>
          <td><input type="text" id="office-phone" placeholder="+15195551234" /></td>
          <td>
            <label class="toggle">
              <input type="checkbox" id="office-active" />
              <span class="slider"></span>
            </label>
          </td>
          <td>
            <button class="btn-test" id="office-test-btn" onclick="sendOfficeTest()">💬 Test Text</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Calendar Modal -->
<div class="modal-overlay" id="cal-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Schedule</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-loading">Loading...</div>
    </div>
  </div>
</div>

<div class="save-bar">
  <span class="status" id="save-status"></span>
  <button class="btn" id="refresh-btn" onclick="refreshCalendars()" style="background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd;">🔄 Refresh Calendars</button>
  <button class="btn btn-primary" onclick="saveConfig()">💾 Save Changes</button>
</div>

<script>
const REPO = "jsibbickrbt/RBT-On-Call";
const BASE_URL = "https://jsibbickrbt.github.io/RBT-On-Call";

const CARRIERS = ["bell","rogers","telus","fido","freedom","virgin","koodo","chatr","public"];

let config = {};

function carrierSelect(selected, id) {
  return `<select id="${id}">${CARRIERS.map(c =>
    `<option value="${c}" ${c === selected ? "selected" : ""}>${c.charAt(0).toUpperCase() + c.slice(1)}</option>`
  ).join("")}</select>`;
}

function renderEmployees() {
  const tbody = document.getElementById("emp-table");
  tbody.innerHTML = "";
  (config.employees || []).forEach((emp, i) => {
    const icsUrl  = `${BASE_URL}/${emp.name.toLowerCase()}_schedule.ics`;
    const webcal  = icsUrl.replace("https://", "webcal://");
    tbody.innerHTML += `
      <tr id="emp-row-${i}">
        <td><input type="text" id="emp-name-${i}" value="${emp.name}" onchange="updateIcsRow(${i})" /></td>
        <td><input type="text" id="emp-phone-${i}" value="${emp.phone || ""}" placeholder="+12265551234" /></td>
        <td>
          <label class="toggle">
            <input type="checkbox" id="emp-active-${i}" ${emp.active !== false ? "checked" : ""} />
            <span class="slider"></span>
          </label>
        </td>
        <td>
          <button class="btn btn-danger" onclick="removeEmployee(${i})">✕</button>
        </td>
      </tr>
      <tr class="ics-url-row" id="ics-row-${i}">
        <td colspan="5">
          <div class="ics-url-box">
            <span style="font-size:0.8rem;color:#888;white-space:nowrap;">📅 ICS:</span>
            <input type="text" id="ics-url-${i}" value="${icsUrl}" readonly onclick="this.select()" />
            <button class="btn-copy" onclick="copyIcs(${i})">Copy</button>
            <a class="btn-copy" id="ics-open-${i}" href="${webcal}" style="text-decoration:none;">📲 Subscribe</a>
            <button class="btn-test" id="test-btn-${i}" onclick="sendTestText(${i}, '${emp.name}')">💬 Test Text</button>
            <button class="btn-view" onclick="viewCalendar('${emp.name}')">📆 View</button>
          </div>
        </td>
      </tr>`;
  });
}

function renderOffice() {
  const office = config.office || {};
  document.getElementById("office-phone").value   = office.phone || "";
  document.getElementById("office-active").checked = office.active || false;
}

function addEmployee() {
  config.employees.push({ name: "New Employee", phone: "", carrier: "bell", active: true });
  renderEmployees();
}

function removeEmployee(i) {
  if (confirm(`Remove ${config.employees[i].name}?`)) {
    config.employees.splice(i, 1);
    renderEmployees();
  }
}

function collectConfig() {
  const employees = (config.employees || []).map((_, i) => ({
    name:   document.getElementById(`emp-name-${i}`).value.trim(),
    phone:  document.getElementById(`emp-phone-${i}`).value.trim(),
    active: document.getElementById(`emp-active-${i}`).checked,
  }));
  return {
    ...config,
    employees,
    office: {
      phone:  document.getElementById("office-phone").value.trim(),
      active: document.getElementById("office-active").checked,
    }
  };
}

async function refreshCalendars() {
  const token = document.getElementById("gh-token").value.trim();
  if (!token) { alert("Please enter your GitHub token first."); return; }
  const btn = document.getElementById("refresh-btn");
  const status = document.getElementById("save-status");
  btn.textContent = "⏳ Refreshing…";
  btn.disabled = true;
  status.textContent = "";
  status.className = "status";
  try {
    const resp = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/update_calendar.yml/dispatches`,
      {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json", "Accept": "application/vnd.github+json" },
        body: JSON.stringify({ ref: "main", inputs: { test_user: "", skip_notify: "true" } })
      }
    );
    if (resp.status === 204) {
      btn.textContent = "✅ Refresh Started";
      status.textContent = "Calendar refresh triggered — takes ~1 min to deploy.";
      status.className = "status ok";
    } else {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${resp.status}`);
    }
  } catch (e) {
    btn.textContent = "🔄 Refresh Calendars";
    btn.disabled = false;
    status.textContent = "Error: " + e.message;
    status.className = "status err";
  }
  setTimeout(() => {
    btn.textContent = "🔄 Refresh Calendars";
    btn.disabled = false;
  }, 10000);
}

async function saveConfig() {
  const token = document.getElementById("gh-token").value.trim();
  if (!token) { alert("Please enter your GitHub token first."); return; }

  const status = document.getElementById("save-status");
  status.className = "status";
  status.textContent = "Saving...";

  const newConfig = collectConfig();
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(newConfig, null, 2))));

  try {
    // Get current SHA of config.json
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/config.json`, {
      headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json" }
    });
    const data = await r.json();
    const sha = data.sha;

    // Push updated config
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/config.json`, {
      method: "PUT",
      headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
      body: JSON.stringify({ message: "Update config via web UI", content, sha })
    });

    if (res.ok) {
      status.className = "status ok";
      status.textContent = "✅ Saved! Calendar will refresh at next scheduled run.";
      config = newConfig;
    } else {
      const err = await res.json();
      status.className = "status err";
      status.textContent = "❌ Error: " + (err.message || "Unknown error");
    }
  } catch (e) {
    status.className = "status err";
    status.textContent = "❌ " + e.message;
  }
}

// Token memory
function saveToken() {
  const token = document.getElementById("gh-token").value.trim();
  if (!token) return;
  localStorage.setItem("rbt_gh_token", token);
  document.getElementById("token-status").textContent = "✅ Token saved in this browser.";
}

function clearToken() {
  localStorage.removeItem("rbt_gh_token");
  document.getElementById("gh-token").value = "";
  document.getElementById("token-status").textContent = "Token cleared.";
}

function loadToken() {
  const saved = localStorage.getItem("rbt_gh_token");
  if (saved) {
    document.getElementById("gh-token").value = saved;
    document.getElementById("token-status").textContent = "✅ Token loaded from browser storage.";
  }
}

// Load config from GitHub on page load
async function loadConfig() {
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/config.json`, {
      headers: { Accept: "application/vnd.github+json" }
    });
    const data = await r.json();
    config = JSON.parse(atob(data.content.replace(/\n/g, "")));
    renderEmployees();
    renderOffice();
  } catch (e) {
    document.getElementById("save-status").textContent = "Failed to load config: " + e.message;
  }
}

async function sendOfficeTest() {
  const token = document.getElementById("gh-token").value.trim();
  if (!token) { alert("Please enter your GitHub token first."); return; }

  const btn = document.getElementById("office-test-btn");
  btn.textContent = "Sending...";
  btn.classList.add("sending");
  btn.disabled = true;

  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/notify.yml/dispatches`, {
      method: "POST",
      headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
      body: JSON.stringify({ ref: "main", inputs: { test_user: "office" } })
    });
    if (res.ok || res.status === 204) {
      btn.textContent = "✅ Sent!";
      btn.classList.remove("sending");
      btn.classList.add("sent");
      setTimeout(() => { btn.textContent = "💬 Test Text"; btn.classList.remove("sent"); btn.disabled = false; }, 4000);
    } else {
      const err = await res.json();
      alert("Error: " + (err.message || res.status));
      btn.textContent = "💬 Test Text";
      btn.classList.remove("sending");
      btn.disabled = false;
    }
  } catch(e) {
    alert("Error: " + e.message);
    btn.textContent = "💬 Test Text";
    btn.classList.remove("sending");
    btn.disabled = false;
  }
}

async function sendTestText(i, name) {
  const token = document.getElementById("gh-token").value.trim();
  if (!token) { alert("Please enter your GitHub token first."); return; }

  const btn = document.getElementById(`test-btn-${i}`);
  btn.textContent = "Sending...";
  btn.classList.add("sending");
  btn.disabled = true;

  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/notify.yml/dispatches`, {
      method: "POST",
      headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
      body: JSON.stringify({ ref: "main", inputs: { test_user: name } })
    });
    if (res.ok || res.status === 204) {
      btn.textContent = "✅ Sent!";
      btn.classList.remove("sending");
      btn.classList.add("sent");
      setTimeout(() => { btn.textContent = "💬 Test Text"; btn.classList.remove("sent"); btn.disabled = false; }, 4000);
    } else {
      const err = await res.json();
      alert("Error: " + (err.message || res.status));
      btn.textContent = "💬 Test Text";
      btn.classList.remove("sending");
      btn.disabled = false;
    }
  } catch(e) {
    alert("Error: " + e.message);
    btn.textContent = "💬 Test Text";
    btn.classList.remove("sending");
    btn.disabled = false;
  }
}

function copyIcs(i) {
  const input = document.getElementById(`ics-url-${i}`);
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = input.nextElementSibling;
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

function updateIcsRow(i) {
  const name   = document.getElementById(`emp-name-${i}`).value.trim().toLowerCase();
  const url    = `${BASE_URL}/${name}_schedule.ics`;
  const webcal = url.replace("https://", "webcal://");
  document.getElementById(`ics-url-${i}`).value = url;
  document.getElementById(`ics-open-${i}`).href  = webcal;
}

// ── Calendar viewer ──────────────────────────────────────────────────────────

function closeModal() {
  document.getElementById("cal-modal").classList.remove("open");
}

function parseIcsEvents(text) {
  const events = [];
  const blocks = text.split("BEGIN:VEVENT");
  for (let i = 1; i < blocks.length; i++) {
    const block = blocks[i];
    const get = (key) => {
      const m = block.match(new RegExp(`${key}[^:]*:([^\r\n]+)`));
      return m ? m[1].trim() : "";
    };
    const summary  = get("SUMMARY");
    const dtstart  = get("DTSTART").replace(/[^0-9]/g, "").slice(0, 8);
    const dtend    = get("DTEND").replace(/[^0-9]/g, "").slice(0, 8);
    if (dtstart) events.push({ summary, dtstart, dtend });
  }
  return events;
}

function formatDate(d8) {
  // d8 = "YYYYMMDD"
  const y = d8.slice(0,4), m = d8.slice(4,6), day = d8.slice(6,8);
  const dt = new Date(+y, +m - 1, +day);
  return dt.toLocaleDateString("en-CA", { weekday: "short", year: "numeric", month: "short", day: "numeric" });
}

function today8() {
  const d = new Date();
  return d.toISOString().slice(0,10).replace(/-/g,"");
}

async function viewCalendar(name) {
  document.getElementById("modal-title").textContent = `${name}'s Schedule`;
  document.getElementById("modal-body").innerHTML = `<div class="modal-loading">⏳ Loading...</div>`;
  document.getElementById("cal-modal").classList.add("open");

  const url = `${BASE_URL}/${name.toLowerCase()}_schedule.ics?cb=${Date.now()}`;
  let text;
  try {
    const r = await fetch(url);
    text = await r.text();
  } catch(e) {
    document.getElementById("modal-body").innerHTML = `<p style="color:#dc2626">Failed to load calendar: ${e.message}</p>`;
    return;
  }

  const events  = parseIcsEvents(text);
  const todayD  = today8();

  // Separate on-call vs vacation, filter to today + future, sort
  const oncall   = events.filter(e => e.summary.toLowerCase().includes("on call") || e.summary.toLowerCase().includes("oncall"));
  const vacation = events.filter(e => e.summary.toLowerCase().includes("vacation"));

  const upcoming = (list) => list.filter(e => e.dtstart >= todayD).sort((a,b) => a.dtstart.localeCompare(b.dtstart));
  const upOncall   = upcoming(oncall);
  const upVacation = upcoming(vacation);

  let html = "";

  if (upOncall.length === 0 && upVacation.length === 0) {
    html = `<p style="color:#888;text-align:center;padding:30px">No upcoming events found.</p>`;
  }

  if (upOncall.length > 0) {
    html += `<div class="cal-section-title">🔵 On Call</div>`;
    upOncall.forEach(ev => {
      const isToday = ev.dtstart === todayD;
      const cls     = isToday ? "cal-event oncall today" : "cal-event oncall";
      html += `<div class="${cls}">
        <div class="cal-date">${formatDate(ev.dtstart)}${isToday ? `<span class="cal-today-badge">TODAY</span>` : ""}</div>
        <div class="cal-label">${ev.summary}</div>
      </div>`;
    });
  }

  if (upVacation.length > 0) {
    html += `<div class="cal-section-title">🟢 Vacation</div>`;
    upVacation.forEach(ev => {
      const endLabel = ev.dtend && ev.dtend !== ev.dtstart
        ? ` → ${formatDate(ev.dtend)}`
        : "";
      html += `<div class="cal-event vacation">
        <div class="cal-date">${formatDate(ev.dtstart)}${endLabel}</div>
        <div class="cal-label">${ev.summary}</div>
      </div>`;
    });
  }

  document.getElementById("modal-body").innerHTML = html;
}

loadToken();
loadConfig();
</script>
</body>
</html>
