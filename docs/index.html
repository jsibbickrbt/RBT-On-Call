<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>RBT On-Call Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; }

  /* ── Nav ── */
  nav {
    background: #1a2e14;
    color: white;
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    flex-shrink: 0;
  }
  .nav-logo svg { width: 34px; height: 34px; }
  .nav-logo-text { line-height: 1.1; }
  .nav-logo-text .brand { font-size: 1rem; font-weight: 800; letter-spacing: 0.04em; }
  .nav-logo-text .sub   { font-size: 0.6rem; font-weight: 500; letter-spacing: 0.08em; opacity: 0.85; }
  .nav-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); }
  .nav-links { display: flex; gap: 2px; flex: 1; }
  .nav-links a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .nav-links a:hover { color: white; background: rgba(255,255,255,0.1); }
  .nav-links a.active { color: white; background: rgba(255,255,255,0.15); }

  /* ── Page ── */
  .page { max-width: 960px; margin: 0 auto; padding: 32px 24px 100px; }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .page-title { font-size: 1.6rem; font-weight: 700; color: #2d6a27; }

  .page-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* ── Buttons ── */
  .btn-outline {
    background: white;
    color: #1a2e14;
    border: 1.5px solid #1a2e14;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-outline:hover { background: #f0f7ee; }
  .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-solid {
    background: #2d6a27;
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-solid:hover { background: #245620; }
  .btn-solid:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-danger-sm {
    background: #fee2e2;
    color: #dc2626;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-danger-sm:hover { background: #fecaca; }

  .btn-sm {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .btn-sm.gray   { background:#f3f4f6; color:#374151; border-color:#d1d5db; }
  .btn-sm.gray:hover { background:#e5e7eb; }
  .btn-sm.green  { background:#f0fdf4; color:#166534; border-color:#bbf7d0; }
  .btn-sm.green:hover { background:#dcfce7; }
  .btn-sm.orange { background:#fff7ed; color:#c2410c; border-color:#fed7aa; }
  .btn-sm.orange:hover { background:#ffedd5; }
  .btn-sm.blue   { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
  .btn-sm.blue:hover { background:#dbeafe; }
  .btn-sm.sent   { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
  .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Cards ── */
  .card {
    background: white;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
  }
  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: #1a2e14;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #f0f2f5;
  }

  /* ── Token card ── */
  .token-card {
    background: #fafff8;
    border: 1px solid #bbf7d0;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .token-label { font-size: 0.85rem; color: #166534; font-weight: 500; white-space: nowrap; }
  .token-card input {
    flex: 1;
    min-width: 200px;
    border: 1px solid #d1d5db;
    border-radius: 7px;
    padding: 7px 12px;
    font-size: 0.875rem;
    outline: none;
  }
  .token-card input:focus { border-color: #2d6a27; }
  .token-status { font-size: 0.8rem; color: #059669; width: 100%; margin-top: 2px; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 8px 12px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
    background: #f9fafb;
    border-bottom: 1px solid #f0f2f5;
  }
  td { padding: 11px 12px; border-bottom: 1px solid #f9fafb; font-size: 0.9rem; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafffe; }

  input[type=text], input[type=password] {
    border: 1px solid #e5e7eb;
    border-radius: 7px;
    padding: 7px 10px;
    font-size: 0.875rem;
    width: 100%;
    outline: none;
    transition: border 0.15s;
  }
  input[type=text]:focus, input[type=password]:focus { border-color: #2d6a27; box-shadow: 0 0 0 2px rgba(45,106,39,0.1); }

  /* ── Toggle ── */
  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background: #d1d5db; border-radius: 22px; transition: .25s; }
  .slider:before { content:""; position:absolute; width:16px; height:16px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.25s; }
  input:checked + .slider { background: #2d6a27; }
  input:checked + .slider:before { transform: translateX(18px); }

  /* ── Add employee btn ── */
  .btn-add-emp {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: #f9fafb;
    border: 2px dashed #d1d5db;
    border-radius: 8px;
    color: #6b7280;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .btn-add-emp:hover { background: #f0fdf4; border-color: #86efac; color: #166534; }

  /* ── ICS row ── */
  .ics-row td { background: #f9fafb; padding: 8px 12px 10px; }
  .ics-box { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ics-box label { font-size: 0.75rem; color: #6b7280; white-space: nowrap; }
  .ics-box input[type=text] {
    min-width: 0;
    flex: 1;
    font-size: 0.75rem;
    font-family: monospace;
    color: #1d4ed8;
    background: white;
    border-color: #e0e7ff;
    cursor: pointer;
    padding: 5px 8px;
  }

  /* ── Office section ── */
  .office-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .office-row .field { flex: 1; min-width: 200px; }
  .office-row label.field-label { font-size: 0.8rem; color: #6b7280; display: block; margin-bottom: 4px; }

  /* ── Status bar ── */
  .save-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid #e5e7eb;
    padding: 14px 32px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    align-items: center;
    z-index: 50;
  }
  .status-msg { font-size: 0.875rem; color: #6b7280; margin-right: auto; }
  .status-msg.ok  { color: #059669; }
  .status-msg.err { color: #dc2626; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 14px;
    width: 100%;
    max-width: 520px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    margin: 20px;
  }
  .modal-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid #f0f2f5;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-size: 1rem; font-weight: 600; color: #2d6a27; }
  .modal-close { background:none; border:none; font-size:1.3rem; cursor:pointer; color:#9ca3af; line-height:1; }
  .modal-close:hover { color: #374151; }
  .modal-body { overflow-y: auto; padding: 16px 22px 22px; flex: 1; }
  .cal-section-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    color: #9ca3af;
    margin: 14px 0 8px;
  }
  .cal-section-title:first-child { margin-top: 0; }
  .cal-event { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px; margin-bottom:5px; }
  .cal-event.oncall   { background:#f0fdf4; border-left:3px solid #2d6a27; }
  .cal-event.vacation { background:#eff6ff; border-left:3px solid #2563eb; }
  .cal-event.today    { background:#fefce8; border-left:3px solid #d97706; }
  .cal-event.conflict { background:#fff7ed; border-left:3px solid #f97316; }
  .cal-conflict-label { font-size:0.72rem; color:#ea580c; font-weight:600; margin-left:6px; }
  .cal-holiday-label  { font-size:0.72rem; color:#b45309; font-weight:600; margin-left:6px; background:#fef3c7; border:1px solid #fde68a; padding:1px 6px; border-radius:99px; }
  .cal-date { font-weight:600; font-size:0.875rem; min-width:130px; color:#1a2e14; }
  .cal-label { font-size:0.82rem; color:#6b7280; }
  .conflict-badge {
    display:inline-flex; align-items:center; gap:4px;
    font-size:0.72rem; background:#fef2f2; color:#dc2626;
    border:1px solid #fecaca; padding:2px 8px; border-radius:99px;
    font-weight:600; cursor:pointer; white-space:nowrap;
    transition: background 0.15s;
  }
  .conflict-badge:hover { background:#fee2e2; }
  .cal-today-badge {
    font-size:0.65rem; background:#fde047; color:#854d0e;
    padding:1px 6px; border-radius:99px; font-weight:700; margin-left:6px;
  }
  .modal-loading { text-align:center; padding:40px; color:#9ca3af; }

  /* ── Info box ── */
  .info-box {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.875rem;
    color: #166534;
  }
</style>
</head>
<body>

<!-- Nav -->
<nav>
  <a class="nav-logo" href="#">
    <!-- Diamond logo -->
    <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="28" height="28" rx="4" stroke="white" stroke-width="2.5" fill="none"/>
      <polygon points="17,6 28,17 17,28 6,17" fill="white"/>
      <polygon points="17,10 24,17 17,24 10,17" fill="#1a2e14"/>
    </svg>
    <div class="nav-logo-text">
      <div class="brand">RBT</div>
      <div class="sub">ELECTRICAL &amp; AUTOMATION</div>
    </div>
  </a>
  <div class="nav-divider"></div>
  <div class="nav-links">
    <a href="#" class="active">On-Call Manager</a>
  </div>
</nav>

<!-- Page -->
<div class="page">

  <!-- Token -->
  <div class="token-card">
    <span class="token-label">🔑 GitHub Token</span>
    <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" />
    <button class="btn-sm green" onclick="saveToken()">Remember</button>
    <button class="btn-sm gray"  onclick="clearToken()">Forget</button>
    <div class="token-status" id="token-status"></div>
  </div>

  <!-- Header -->
  <div class="page-header">
    <h1 class="page-title">On-Call Manager</h1>
    <div class="page-actions">
      <button class="btn-outline" id="refresh-btn" onclick="refreshCalendars()">🔄 Refresh Calendars</button>
      <button class="btn-solid"   onclick="saveConfig()">Save Changes</button>
    </div>
  </div>

  <!-- Employees -->
  <div class="card">
    <div class="card-title">👥 Employees</div>
    <table>
      <thead>
        <tr>
          <th style="width:36px;">#</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Active</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="emp-table"></tbody>
    </table>
    <button class="btn-add-emp" onclick="addEmployee()">+ Add Employee</button>
    <div style="margin-top:12px;text-align:right;">
      <button class="btn-sm orange" id="text-all-btn" onclick="sendTextAll()">💬 Test Text All</button>
    </div>
  </div>

  <!-- Office -->
  <div class="card">
    <div class="card-title">🏢 Office Notification</div>
    <p style="font-size:0.85rem;color:#6b7280;margin-bottom:16px;">Receives a daily text listing everyone on call.</p>
    <div class="office-row">
      <div class="field">
        <label class="field-label">Phone Number</label>
        <input type="text" id="office-phone" placeholder="+15195551234" />
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding-top:20px;">
        <label class="toggle">
          <input type="checkbox" id="office-active" />
          <span class="slider"></span>
        </label>
        <span style="font-size:0.85rem;color:#374151;">Active</span>
      </div>
      <div style="padding-top:20px;">
        <button class="btn-sm orange" id="office-test-btn" onclick="sendOfficeTest()">💬 Test Text</button>
      </div>
      <div style="padding-top:20px;">
        <button class="btn-sm" id="conflict-btn" onclick="checkConflicts()" style="background:#fefce8;color:#854d0e;border-color:#fde047;">⚠️ Check Conflicts</button>
      </div>
    </div>
  </div>

</div>

<!-- Calendar Modal -->
<div class="modal-overlay" id="cal-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Schedule</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-loading">Loading…</div>
    </div>
  </div>
</div>

<!-- Save bar -->
<div class="save-bar">
  <span class="status-msg" id="save-status"></span>
  <button class="btn-outline" id="refresh-btn2" onclick="refreshCalendars()">🔄 Refresh Calendars</button>
  <button class="btn-solid"   onclick="saveConfig()">Save Changes</button>
</div>

<script>
const REPO     = "jsibbickrbt/RBT-On-Call";
const BASE_URL = "https://jsibbickrbt.github.io/RBT-On-Call";

let config = {};

function renderEmployees() {
  const tbody = document.getElementById("emp-table");
  tbody.innerHTML = "";
  (config.employees || []).forEach((emp, i) => {
    const icsUrl = `${BASE_URL}/${emp.name.toLowerCase()}_schedule.ics`;
    const webcal = icsUrl.replace("https://", "webcal://");
    tbody.innerHTML += `
      <tr id="emp-row-${i}">
        <td style="color:#9ca3af;font-size:0.85rem;font-weight:600;text-align:center;">${i + 1}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <input type="text" id="emp-name-${i}" value="${emp.name}" onchange="updateIcsRow(${i})" style="max-width:160px;" />
            <span id="conflict-badge-${i}"></span>
          </div>
        </td>
        <td><input type="text" id="emp-phone-${i}" value="${emp.phone || ""}" placeholder="+12265551234" style="max-width:180px;" /></td>
        <td>
          <label class="toggle">
            <input type="checkbox" id="emp-active-${i}" ${emp.active !== false ? "checked" : ""} />
            <span class="slider"></span>
          </label>
        </td>
        <td>
          <button class="btn-danger-sm" onclick="removeEmployee(${i})">✕ Remove</button>
        </td>
      </tr>
      <tr class="ics-row" id="ics-row-${i}">
        <td colspan="4">
          <div class="ics-box">
            <label>📅 ICS:</label>
            <input type="text" id="ics-url-${i}" value="${icsUrl}" readonly onclick="this.select()" />
            <button class="btn-sm gray"   onclick="copyIcs(${i})" id="copy-btn-${i}">Copy</button>
            <a class="btn-sm blue" id="ics-open-${i}" href="${webcal}" style="text-decoration:none;">📲 Subscribe</a>
            <button class="btn-sm orange" id="test-btn-${i}" onclick="sendTestText(${i}, '${emp.name}')">💬 Test</button>
            <button class="btn-sm green"  id="cal-btn-${i}"  onclick="sendCalendarLink(${i}, '${emp.name}')">📅 Send Link</button>
            <button class="btn-sm blue"   onclick="viewCalendar('${emp.name}')">📆 View</button>
          </div>
        </td>
      </tr>`;
  });
}

function renderOffice() {
  const o = config.office || {};
  document.getElementById("office-phone").value   = o.phone  || "";
  document.getElementById("office-active").checked = o.active || false;
}

function addEmployee() {
  config = collectConfig();
  config.employees.push({ name: "New Employee", phone: "", active: true });
  renderEmployees();
}

function removeEmployee(i) {
  config = collectConfig();
  if (confirm(`Remove ${config.employees[i].name}?`)) {
    config.employees.splice(i, 1);
    renderEmployees();
  }
}

function collectConfig() {
  const employees = (config.employees || []).map((_, i) => ({
    name:   document.getElementById(`emp-name-${i}`).value.trim(),
    phone:  document.getElementById(`emp-phone-${i}`).value.trim(),
    active: document.getElementById(`emp-active-${i}`).checked,
  }));
  return {
    ...config,
    employees,
    office: {
      phone:  document.getElementById("office-phone").value.trim(),
      active: document.getElementById("office-active").checked,
    }
  };
}

function setStatus(msg, type = "") {
  const el = document.getElementById("save-status");
  el.textContent = msg;
  el.className = "status-msg" + (type ? " " + type : "");
}

async function refreshCalendars() {
  const token = document.getElementById("gh-token").value.trim();
  if (!token) { alert("Please enter your GitHub token first."); return; }
  ["refresh-btn","refresh-btn2"].forEach(id => {
    const b = document.getElementById(id);
    if (b) { b.textContent = "⏳ Refreshing…"; b.disabled = true; }
  });
  setStatus("");
  try {
    const resp = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/update_calendar.yml/dispatches`,
      { method:"POST", headers:{"Authorization":`Bearer ${token}`,"Content-Type":"application/json","Accept":"application/vnd.github+json"}, body:JSON.stringify({ref:"main",inputs:{}}) }
    );
    if (resp.status === 204) {
      setStatus("✅ Calendar refresh triggered — reloading in 3s…", "ok");
      setTimeout(() => location.reload(), 3000);
    } else {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${resp.status}`);
    }
  } catch(e) {
    ["refresh-btn","refresh-btn2"].forEach(id => {
      const b = document.getElementById(id);
      if (b) { b.textContent = "🔄 Refresh Calendars"; b.disabled = false; }
    });
    setStatus("❌ " + e.message, "err");
  }
}

async function saveConfig() {
  const token = document.getElementById("gh-token").value.trim();
  if (!token) { alert("Please enter your GitHub token first."); return; }
  setStatus("Saving…");
  const newConfig = collectConfig();
  const content   = btoa(unescape(encodeURIComponent(JSON.stringify(newConfig, null, 2))));
  try {
    const r    = await fetch(`https://api.github.com/repos/${REPO}/contents/config.json?_=${Date.now()}`, { cache:"no-store", headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json"} });
    const data = await r.json();
    const res  = await fetch(`https://api.github.com/repos/${REPO}/contents/config.json`, {
      method:"PUT",
      headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({message:"Update config via web UI",content,sha:data.sha})
    });
    if (res.ok) {
      setStatus("✅ Saved! Reloading in 3s…", "ok");
      config = newConfig;
      setTimeout(() => location.reload(), 3000);
    } else {
      const err = await res.json();
      setStatus("❌ " + (err.message || "Unknown error"), "err");
    }
  } catch(e) {
    setStatus("❌ " + e.message, "err");
  }
}

function saveToken() {
  const token = document.getElementById("gh-token").value.trim();
  if (!token) return;
  localStorage.setItem("rbt_gh_token", token);
  document.getElementById("token-status").textContent = "✅ Token saved in this browser.";
}

function clearToken() {
  localStorage.removeItem("rbt_gh_token");
  document.getElementById("gh-token").value = "";
  document.getElementById("token-status").textContent = "Token cleared.";
}

function loadToken() {
  const saved = localStorage.getItem("rbt_gh_token");
  if (saved) {

// ── Calendar viewer ──────────────────────────────────────────────────────────
function closeModal() { document.getElementById("cal-modal").classList.remove("open"); }

function parseIcsEvents(text) {
  const events=[];
  const blocks=text.split("BEGIN:VEVENT");
  for (let i=1;i<blocks.length;i++) {
    const b=blocks[i];
    const get=(key)=>{ const m=b.match(new RegExp(`${key}[^:]*:([^\r\n]+)`)); return m?m[1].trim():""; };
    const dtstart=get("DTSTART").replace(/[^0-9]/g,"").slice(0,8);
    const dtend  =get("DTEND").replace(/[^0-9]/g,"").slice(0,8);
    if (dtstart) events.push({summary:get("SUMMARY"),dtstart,dtend});
  }
  return events;
}

function formatDate(d8) {
  const y=d8.slice(0,4),m=d8.slice(4,6),day=d8.slice(6,8);
  return new Date(+y,+m-1,+day).toLocaleDateString("en-CA",{weekday:"short",year:"numeric",month:"short",day:"numeric"});
}

function today8() { return new Date().toISOString().slice(0,10).replace(/-/g,""); }

// Canadian (Ontario) statutory holidays
function getCanadianHolidays(year) {
  const holidays = {};
  const d8 = (y,m,d) => `${y}${String(m).padStart(2,"0")}${String(d).padStart(2,"0")}`;
  const nthMonday = (y,m,n) => { const d=new Date(y,m-1,1); d.setDate(1+(((8-d.getDay())%7)||7)+(n-1)*7); return d.getDate(); };
  const lastMonday = (y,m) => { const d=new Date(y,m,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.getDate(); };

  // Easter (Anonymous Gregorian algorithm)
  const easter = (y) => {
    const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m2=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m2+114)/31),day=((h+l-7*m2+114)%31)+1;
    return {month,day};
  };
  const {month:em,day:ed}=easter(year);
  const easterDate=new Date(year,em-1,ed);
  const goodFriday=new Date(easterDate); goodFriday.setDate(easterDate.getDate()-2);
  const easterMonday=new Date(easterDate); easterMonday.setDate(easterDate.getDate()+1);

  // Fixed holidays
  holidays[d8(year,1,1)]  = "New Year's Day 🍁";
  holidays[d8(year,7,1)]  = "Canada Day 🍁";
  holidays[d8(year,11,11)]= "Remembrance Day 🍁";
  holidays[d8(year,12,25)]= "Christmas Day 🍁";
  holidays[d8(year,12,26)]= "Boxing Day 🍁";

  // Ontario fixed
  holidays[d8(year,2,nthMonday(year,2,3))] = "Family Day 🍁";
  holidays[d8(year,goodFriday.getMonth()+1,goodFriday.getDate())] = "Good Friday 🍁";
  holidays[d8(year,easterMonday.getMonth()+1,easterMonday.getDate())] = "Easter Monday 🍁";

  // Victoria Day: last Monday before May 25
  const vd = new Date(year,4,25); vd.setDate(25-((vd.getDay()+6)%7||7));
  holidays[d8(year,5,vd.getDate())] = "Victoria Day 🍁";

  // Civic Holiday: 1st Monday of August (Ontario)
  holidays[d8(year,8,nthMonday(year,8,1))] = "Civic Holiday 🍁";

  // Labour Day: 1st Monday of September
  holidays[d8(year,9,nthMonday(year,9,1))] = "Labour Day 🍁";

  // Thanksgiving: 2nd Monday of October
  holidays[d8(year,10,nthMonday(year,10,2))] = "Thanksgiving 🍁";

  return holidays;
}

function buildHolidayMap(years) {
  let map = {};
  years.forEach(y => Object.assign(map, getCanadianHolidays(y)));
  return map;
}

async function viewCalendar(name) {
  document.getElementById("modal-title").textContent=`${name}'s Schedule`;
  document.getElementById("modal-body").innerHTML=`<div class="modal-loading">⏳ Loading…</div>`;
  document.getElementById("cal-modal").classList.add("open");
  try {
    const text=await(await fetch(`${BASE_URL}/${name.toLowerCase()}_schedule.ics?cb=${Date.now()}`)).text();
    const events=parseIcsEvents(text);
    const todayD=today8();
    const oncall  =events.filter(e=>e.summary.toLowerCase().includes("on call")||e.summary.toLowerCase().includes("oncall"));
    const vacation=events.filter(e=>e.summary.toLowerCase().includes("vacation"));
    const upcoming=(list)=>list.filter(e=>e.dtstart>=todayD).sort((a,b)=>a.dtstart.localeCompare(b.dtstart));
    const upOncall=upcoming(oncall), upVacation=upcoming(vacation);
    const conflictSet=new Set(findIcsConflicts(events));
    const years=[...new Set(upOncall.map(e=>+e.dtstart.slice(0,4)))];
    if (!years.includes(new Date().getFullYear())) years.push(new Date().getFullYear());
    const holidays=buildHolidayMap(years);
    let html="";
    if (!upOncall.length&&!upVacation.length) html=`<p style="color:#9ca3af;text-align:center;padding:32px">No upcoming events.</p>`;
    if (upOncall.length) {
      html+=`<div class="cal-section-title">On Call</div>`;
      upOncall.forEach(ev=>{
        const t=ev.dtstart===todayD;
        const c=conflictSet.has(ev.dtstart);
        const h=holidays[ev.dtstart];
        const cls=t?"today":c?"conflict":"oncall";
        const extra=(c?`<span class="cal-conflict-label">⚠️ Vacation conflict</span>`:"")+
                    (h?`<span class="cal-holiday-label" title="${h}">${h}</span>`:"");
        html+=`<div class="cal-event ${cls}"><div class="cal-date">${formatDate(ev.dtstart)}${t?`<span class="cal-today-badge">TODAY</span>`:""}</div><div class="cal-label">${ev.summary}${extra}</div></div>`;
      });
    }
    if (upVacation.length) {
      html+=`<div class="cal-section-title">Vacation</div>`;
      upVacation.forEach(ev=>{
        const end=ev.dtend&&ev.dtend!==ev.dtstart?` → ${formatDate(ev.dtend)}`:"";
        html+=`<div class="cal-event vacation"><div class="cal-date">${formatDate(ev.dtstart)}${end}</div><div class="cal-label">${ev.summary}</div></div>`;
      });
    }
    document.getElementById("modal-body").innerHTML=html;
  } catch(e) {
    document.getElementById("modal-body").innerHTML=`<p style="color:#dc2626">Failed to load: ${e.message}</p>`;
  }
}

function findIcsConflicts(events) {
  const todayD = today8();
  const oncallDates = [];
  const vacationRanges = [];
  events.forEach(ev => {
    const s = ev.summary.toLowerCase();
    const isOncall  = (s.includes("on call") || s.includes("oncall")) && !s.includes("vacation");
    const isVacation = s.includes("vacation");
    if (isOncall  && ev.dtstart >= todayD) oncallDates.push(ev.dtstart);
    if (isVacation && ev.dtstart)          vacationRanges.push({ start: ev.dtstart, end: ev.dtend || ev.dtstart });
  });
  return oncallDates.filter(d =>
    vacationRanges.some(v => v.start <= d && d < v.end)
  );
}

async function checkAllConflicts() {
  const emps = config.employees || [];
  for (let i = 0; i < emps.length; i++) {
    const badge = document.getElementById(`conflict-badge-${i}`);
    if (!badge) continue;
    const name = emps[i].name;
    try {
      const text = await (await fetch(`${BASE_URL}/${name.toLowerCase()}_schedule.ics?cb=${Date.now()}`)).text();
      const events = parseIcsEvents(text);
      const conflicts = findIcsConflicts(events);
      if (conflicts.length > 0) {
        const dates = conflicts.map(d => formatDate(d)).join(", ");
        badge.innerHTML = `<span class="conflict-badge" title="On call during vacation: ${dates}" onclick="viewCalendar('${name}')">⚠️ Conflict: ${dates}</span>`;
      } else {
        badge.innerHTML = "";
      }
    } catch(e) {
      badge.innerHTML = "";
    }
  }
}
